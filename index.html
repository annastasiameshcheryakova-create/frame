<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-Frame сцена — Милий шрифт</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene background="color: #8c8c8c">
    
    <a-assets>
      <img
        id="floorTexture"
        src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/illustration/758px-Canestra_di_frutta_(Caravaggio).jpg"
        crossorigin="anonymous"
      >

      <img id="deliusImg" src="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/delius/delius.png" crossorigin="anonymous">
      <a-asset-item id="deliusJson" src="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/delius/delius.json"></a-asset-item>
    </a-assets>

    <a-sky color="#8c8c8c"></a-sky>

    <a-light type="ambient" color="#bbbbbb" intensity="1"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="0 4 2"></a-light>

    <a-entity id="sceneGroup" position="0 0 0">

      <a-plane
        src="#floorTexture"
        width="7"
        height="7"
        rotation="-55 0 0"
        position="0 -2 -5"
        color="purple">
      </a-plane>

      <a-plane
        width="6"
        height="1.2"
        position="3 2 -7"
        color="white"
        geometry="primitive: plane; width: 6.2; height: 1.4; border-radius: 0.2">
      </a-plane>

      <a-text
        value="Welcome to browser's VR!"
        color="black"
        width="10"
        align="center"
        position="3 2 -6.95"
        font="#deliusJson" 
        font-image="#deliusImg"
        negate="false"
        wrap-count="20">
      </a-text>

      <a-cylinder color="yellow" height="3" radius="0.05" position="-1.5 -0.5 -5"></a-cylinder>
      <a-cylinder color="blue" height="3" radius="0.05" position="-2.5 -0.5 -5"></a-cylinder>

      <a-torus
        position="-1.5 1.5 -5"
        color="green"
        radius="1.2"
        radius-tubular="0.2"
        rotation="0 0 0" 
        animation="property: components.material.material.color; type: color; from: green; to: #3cff00; dir: alternate; loop: true; dur: 3000"
        animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-torus>

      <a-torus-knot
        color="orange"
        radius="1"
        radius-tubular="0.2" 
        p="2"
        q="3"
        position="-2.5 1.5 -5"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 12000; easing: linear">
      </a-torus-knot>

    </a-entity>

    <a-camera position="0 1.6 0"></a-camera>
    
  </a-scene>

</body>
</html>
